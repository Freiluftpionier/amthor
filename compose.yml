services:
  amthor-web:
    image: nginx:alpine
    container_name: amthor-web
    restart: unless-stopped
    volumes:
      - ./site:/usr/share/nginx/html:ro
    networks:
      - edge
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=edge"
      - "traefik.http.routers.amthor.rule=Host(`amthor.dehna.it`)"
      - "traefik.http.routers.amthor.entrypoints=web"
      - "traefik.http.services.amthor.loadbalancer.server.port=80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5

networks:
  edge:
    external: true
