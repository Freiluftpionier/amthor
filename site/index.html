<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>amthor.dehna.it</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "Segoe UI", Helvetica, Arial, sans-serif;
        background: #f4f1ea;
        color: #1f2933;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top, rgba(180, 142, 92, 0.25), transparent 35%),
          linear-gradient(180deg, #f7f3ec 0%, #efe7db 100%);
      }

      main {
        width: min(680px, calc(100% - 32px));
        padding: 48px 40px;
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.82);
        box-shadow: 0 24px 60px rgba(42, 51, 61, 0.15);
        backdrop-filter: blur(8px);
      }

      h1 {
        margin: 0 0 16px;
        font-size: clamp(2rem, 5vw, 3.25rem);
        line-height: 1.05;
      }

      p {
        margin: 0;
        font-size: 1.05rem;
        line-height: 1.6;
      }

      strong {
        color: #7c4a16;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>amthor.dehna.it</h1>
      <p>
        Das Projekt ist auf diesem Server vorbereitet und über <strong>Traefik</strong>
        fuer den Host <strong>amthor.dehna.it</strong> erreichbar, sobald der vorgeschaltete
        <strong>nginx</strong>-Reverse-Proxy auf diesen Server zeigt.
      </p>
    </main>
  </body>
</html>
